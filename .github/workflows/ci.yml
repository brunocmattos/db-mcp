name: CI

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint & types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      # `--all-extras` NAO e' detalhe: sem o driver do MySQL o mypy nao resolve o
      # `import mysql.connector` (medido: 2 erros import-not-found) e o
      # `test_invariante_todo_dialeto[mysql]` se PULA — silenciando justamente o
      # gate que existe pra pegar dialeto novo mal escrito.
      - name: Install dependencies (locked, reproducible)
        run: uv sync --locked --all-extras

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy (strict)
        run: uv run mypy src

  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv and pin the matrix Python
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: py${{ matrix.python-version }}

      # `--all-extras`: sem o driver, `test_invariante_todo_dialeto[mysql]` se PULA
      # (dialeto_ou_skip) e o gate contra dialeto mal escrito some em silencio.
      - name: Install dependencies (locked, reproducible)
        run: uv sync --locked --all-extras

      # Neste job não há banco: os testes de integração/E2E/doctor se pulam sozinhos.
      # Os jobs `integration-postgres` e `integration-mysql` os rodam de verdade.
      - name: Run tests (unit)
        run: uv run pytest -q

  integration-postgres:
    name: integration postgres (ubuntu / py3.12)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: demo
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d demo"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      # `--all-extras`: sem o driver, `test_invariante_todo_dialeto[mysql]` se PULA
      # (dialeto_ou_skip) e o gate contra dialeto mal escrito some em silencio.
      - name: Install dependencies (locked, reproducible)
        run: uv sync --locked --all-extras

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      # Mesmo schema/seed/usuário read-only da demo local (demo/init/*.sql).
      - name: Seed database
        env:
          PGPASSWORD: postgres
        run: |
          for f in demo/init/*.sql; do
            psql -h localhost -U postgres -d demo -v ON_ERROR_STOP=1 -f "$f"
          done

      # Com DB_* no ambiente, integração/E2E/doctor rodam de verdade (read-only,
      # allowlist, auth, os caminhos que tocam o banco).
      - name: Run full test suite
        env:
          DIALETO: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_DBNAME: demo
          DB_USER: mcp_ro
          DB_PASSWORD: mcp_ro_demo
          DB_SSLMODE: disable
        run: uv run pytest -q

      - name: Doctor (6/6 contra o Postgres real)
        env:
          DIALETO: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_DBNAME: demo
          DB_USER: mcp_ro
          DB_PASSWORD: mcp_ro_demo
          DB_SSLMODE: disable
        run: uv run db-mcp --dialect postgres doctor

  # Espelho do job acima com o OUTRO banco. Os dois existem porque a suite e' a mesma:
  # cada corpus de ataque se pula quando roda contra o dialeto que nao e' o dele, entao
  # so' rodando as DUAS vezes o conjunto inteiro e' exercitado. E' o criterio de pronto
  # da Fase 1: "suite verde com CADA banco".
  integration-mysql:
    name: integration mysql (ubuntu / py3.12)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: demo
          MYSQL_ROOT_PASSWORD: root_demo
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot_demo"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies (locked, reproducible)
        run: uv sync --locked --all-extras

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      # Mesmo schema/seed/usuário read-only da demo local (demo/init-mysql/*.sql).
      - name: Seed database
        run: |
          for f in demo/init-mysql/*.sql; do
            mysql -h 127.0.0.1 -P 3306 -uroot -proot_demo demo < "$f"
          done

      - name: Run full test suite
        env:
          DIALETO: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_DBNAME: demo
          DB_USER: mcp_ro
          DB_PASSWORD: mcp_ro_demo
        run: uv run pytest -q

      - name: Doctor (6/6 contra o MySQL real)
        env:
          DIALETO: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_DBNAME: demo
          DB_USER: mcp_ro
          DB_PASSWORD: mcp_ro_demo
        run: uv run db-mcp --dialect mysql doctor

  # Terceiro dialeto. Diferente do Postgres/MySQL, a imagem do SQL Server NAO aplica
  # .sql de um diretorio de init sozinha (por isso o demo local tem um entrypoint.sh
  # customizado — ver demo/init-sqlserver/entrypoint.sh). E os `services:` do Actions
  # so aceitam image/env/ports/options/credentials: nao da pra trocar o entrypoint
  # aqui pra reusar aquele script direto.
  #
  # Por isso o seed vira um STEP: copia os .sql pro container do servico (docker cp)
  # e aplica com o MESMO sqlcmd/MESMA ordem/MESMO -f 65001 que o entrypoint.sh usa
  # localmente — via `docker exec` no id do servico (job.services.sqlserver.id).
  # Reusa o caminho ja medido no demo local em vez de duplicar a logica de split
  # por `GO` num seeder Python (GO e' diretiva do sqlcmd, nao SQL — reimplementar
  # o parser em outra linguagem so' pra fugir do docker exec nao paga o custo).
  # Validado igual a este job, container a container, antes do push.
  integration-sqlserver:
    name: integration sqlserver (ubuntu / py3.12)
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Sonda_MCP_2026!"
          MSSQL_PID: "Developer"
        ports:
          - 1434:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Sonda_MCP_2026!' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      # `--all-extras`: sem o driver, o mypy nao resolve `import pymssql` e o
      # `test_invariante_todo_dialeto[sqlserver]` se PULA (dialeto_ou_skip),
      # silenciando justamente o gate que existe pra pegar dialeto novo mal escrito.
      - name: Install dependencies (locked, reproducible)
        run: uv sync --locked --all-extras

      # Mesmo schema/seed/usuário read-only da demo local (demo/init-sqlserver/*.sql),
      # aplicados na mao porque a imagem nao roda .sql de diretorio de init sozinha.
      - name: Seed database (schema + dados + usuario read-only)
        run: |
          docker cp demo/init-sqlserver "${{ job.services.sqlserver.id }}:/init"
          docker exec "${{ job.services.sqlserver.id }}" bash -c '
            set -e
            for f in /init/*.sql; do
              echo "aplicando $f"
              /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Sonda_MCP_2026!" -C -f 65001 -i "$f"
            done
          '

      # Com DB_* no ambiente, integração/E2E/doctor rodam de verdade. `-rs` deixa os
      # skips (corpus dos OUTROS dois dialetos) auditáveis no log em vez de silenciosos.
      - name: Run full test suite
        env:
          DIALETO: sqlserver
          DB_HOST: 127.0.0.1
          DB_PORT: "1434"
          DB_DBNAME: demo
          DB_USER: mcp_ro
          DB_PASSWORD: "Mcp_ro_demo_2026!"
        run: uv run pytest -q -rs

      - name: Doctor (6/6 contra o SQL Server real)
        run: uv run db-mcp --env .env.demo-sqlserver doctor
