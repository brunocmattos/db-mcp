# Bancos de demonstração: já sobem semeados e com o usuário read-only mcp_ro pronto.
# Servem pra experimentar o MCP sem apontar pro seu banco.
#
#   docker compose up -d                              # Postgres (default)
#   uv run db-mcp --env .env.demo doctor              # deve ficar tudo verde
#   uv run db-mcp --env .env.demo                     # sobe o servidor (stdio)
#
#   docker compose --profile mysql up -d              # MySQL (opcional)
#   uv run db-mcp --env .env.demo-mysql doctor
#
#   docker compose --profile sqlserver up -d          # SQL Server (opcional)
#   uv run db-mcp --env .env.demo-sqlserver doctor
#
# MySQL e SQL Server ficam atrás de profiles pra `docker compose up -d` continuar
# subindo só o Postgres — quem só usa um banco não paga os outros. Portas
# 5433/3307/1434 no host pra não colidir com instâncias que você já tenha nas
# portas padrão.

services:
  db:
    image: postgres:17-alpine
    container_name: db-mcp-demo
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./demo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demo"]
      interval: 2s
      timeout: 3s
      retries: 20

  db-mysql:
    image: mysql:8.4
    container_name: db-mcp-demo-mysql
    profiles: ["mysql"]
    environment:
      MYSQL_DATABASE: demo
      MYSQL_ROOT_PASSWORD: root_demo
    ports:
      - "3307:3306"
    volumes:
      - ./demo/init-mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_demo"]
      interval: 2s
      timeout: 3s
      retries: 30

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-mcp-demo-sqlserver
    profiles: ["sqlserver"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Sonda_MCP_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"   # 1433 costuma estar ocupada por instancia local
    volumes:
      - ./demo/init-sqlserver:/init:ro
    entrypoint: ["/bin/bash", "/init/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
